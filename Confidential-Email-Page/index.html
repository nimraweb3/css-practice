<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confidential Email</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main id="email">
    <div id="confidential">CONFIDENTIAL</div>
    <div id="top-secret">TOP SECRET</div>

    <h1>Project Phoenix</h1>

    <p>
      Dear Team,
    </p>

    <p>
      This message contains
      <span class="blurred">classified project details</span>
      that must not be shared outside the organization.
    </p>

    <p>
      The deployment is scheduled for
      <span class="blurred">August 15 at 02:00 UTC</span>.
      Contact
      <span class="blurred">operations command</span>
      if immediate assistance is required.
    </p>

  </main>

</body>
</html>
