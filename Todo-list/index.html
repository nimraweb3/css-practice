<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Checklist</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>📚 Study Checklist</h1>

    <ul class="todo-list">
      <li>
        <input type="checkbox" id="html" />
        <label for="html">Complete HTML Basics</label>

        <ul class="sub-item">
          <li>
            <a
              class="sub-item-link"
              href="https://developer.mozilla.org/en-US/docs/Web/HTML"
              target="_blank"
            >
              HTML Documentation
            </a>
          </li>
        </ul>
      </li>

      <li>
        <input type="checkbox" id="css" />
        <label for="css">Practice CSS Layouts</label>

        <ul class="sub-item">
          <li>
            <a
              class="sub-item-link"
              href="https://developer.mozilla.org/en-US/docs/Web/CSS"
              target="_blank"
            >
              CSS Reference
            </a>
          </li>
        </ul>
      </li>

      <li>
        <input type="checkbox" id="js" />
        <label for="js">Learn JavaScript</label>

        <ul class="sub-item">
          <li>
            <a
              class="sub-item-link"
              href="https://developer.mozilla.org/en-US/docs/Web/JavaScript"
              target="_blank"
            >
              JavaScript Guide
            </a>
          </li>
        </ul>
      </li>

      <li>
        <input type="checkbox" id="git" />
        <label for="git">Master Git & GitHub</label>

        <ul class="sub-item">
          <li>
            <a
              class="sub-item-link"
              href="https://git-scm.com/doc"
              target="_blank"
            >
              Git Documentation
            </a>
          </li>
        </ul>
      </li>
    </ul>
  </main>
</body>
</html>
