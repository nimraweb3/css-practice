  <div class="business-card">

    <p class="designation">Blockchain Developer</p>
    <p class="company">Nimra Web3</p>

    <hr>

    <p>nimra@example.com</p>
    <p>+92 300 1234567</p>

    <a
      class="portfolio-link"
      href="https://github.com/nimraweb3"

      Portfolio
    </a>

    <div class="social-media">

      <a href="https://linkedin.com">LinkedIn</a><br>
