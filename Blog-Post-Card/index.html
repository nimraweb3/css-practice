<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Post Card</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="blog-post-card">
    <img
      class="post-img"
      src="https://cdn.freecodecamp.org/curriculum/labs/cover-photo.jpg"
      alt="A peaceful mountain landscape during sunrise."
    >

    <div class="post-content">
      <h2 class="post-title">Discover the Beauty of Nature</h2>

      <p class="post-excerpt">
        Escape the busy city life and explore breathtaking mountains,
        peaceful lakes, and unforgettable outdoor adventures.
      </p>

      <a
        class="read-more"
        href="https://www.freecodecamp.org"
        target="_blank"
      >
        Read More
      </a>
    </div>
  </div>

</body>
</html>
